<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 60 60" fill="none">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1e293b"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>
    <linearGradient id="shieldBody" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#22d3ee"/>
      <stop offset="100%" stop-color="#0284c7"/>
    </linearGradient>
    <linearGradient id="shieldSheen" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.6"/>
      <stop offset="40%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <radialGradient id="coreGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#a5f3fc" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#22d3ee" stop-opacity="0"/>
    </radialGradient>
    <filter id="glowFilter" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="1" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="60" height="60" rx="10" />

  
  <!-- Subtle Border -->
  <rect x="0.5" y="0.5" width="59" height="59" rx="11.5" ry="11.5" fill="none" stroke="#ffffff" stroke-opacity="0.1" />

  
  <!-- Background Tech Ring -->
  <circle cx="30" cy="30" r="24" fill="none" stroke="#334155" stroke-width="1.5" stroke-dasharray="4 2"/>
  
  <!-- Orbital Rings (Simulated Rotation) -->
  <g transform="translate(30, 30)">
    <ellipse rx="22" ry="8" fill="none" stroke="#0ea5e9" stroke-width="1" stroke-opacity="0.5" transform="rotate(45)"/>
    <ellipse rx="22" ry="8" fill="none" stroke="#0ea5e9" stroke-width="1" stroke-opacity="0.5" transform="rotate(-45)"/>
    
    <!-- Orbital Nodes -->
    <circle cx="22" cy="0" r="1.5" fill="#a5f3fc" transform="rotate(45)"/>
    <circle cx="-22" cy="0" r="1.5" fill="#a5f3fc" transform="rotate(-45)"/>
  </g>

  <!-- Central Shield -->
  <g filter="url(#glowFilter)">
    <!-- Shield Shape -->
    <path d="M30 14 L44 20 V30 C44 40 30 48 30 48 C30 48 16 40 16 30 V20 L30 14 Z" 
          fill="url(#shieldBody)" 
          stroke="#cffafe" 
          stroke-width="1.5"/>
    
    <!-- Inner Tech Pattern -->
    <path d="M30 14 V48 M16 30 H44 M23 20 L37 20 M23 40 L37 40" 
          stroke="#083344" 
          stroke-width="0.5" 
          opacity="0.3"
          fill="none"/>
          
    <!-- Sheen Highlight -->
    <path d="M30 15 L42 21 V30 C42 35 35 40 30 42 V15 Z" 
          fill="url(#shieldSheen)"/>
          
    <!-- Core Energy Point -->
    <circle cx="30" cy="30" r="3" fill="#ffffff"/>
  </g>
</svg>