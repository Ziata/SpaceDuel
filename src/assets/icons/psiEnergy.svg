<svg  viewBox="0 0 60 60" xmlns="http://www.w3.org/2000/svg" fill="none">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2b1055"/>
      <stop offset="50%" stop-color="#180c2e"/>
      <stop offset="100%" stop-color="#000000"/>
    </linearGradient>
    <linearGradient id="energyGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#00ffff"/>
      <stop offset="50%" stop-color="#d500f9"/>
      <stop offset="100%" stop-color="#651fff"/>
    </linearGradient>
    <radialGradient id="coreGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.8"/>
      <stop offset="40%" stop-color="#d500f9" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#651fff" stop-opacity="0"/>
    </radialGradient>
    <filter id="glowBlur" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>

  <!-- Background Container -->
  <rect x="0" y="0" width="60" height="60" rx="12" />
  



  <!-- Subtle Starfield -->
  <circle cx="10" cy="12" r="0.8" fill="#ffffff" opacity="0.6"/>
  <circle cx="50" cy="8" r="0.5" fill="#ffffff" opacity="0.4"/>
  <circle cx="45" cy="50" r="0.6" fill="#ffffff" opacity="0.5"/>
  <circle cx="8" cy="48" r="0.4" fill="#ffffff" opacity="0.3"/>
  <circle cx="52" cy="30" r="0.3" fill="#ffffff" opacity="0.4"/>

  <!-- Orbital Ring (Space Element) -->
  <ellipse cx="30" cy="30" rx="22" ry="8" fill="none" stroke="#651fff" stroke-width="1" opacity="0.4" transform="rotate(-20 30 30)"/>
  <ellipse cx="30" cy="30" rx="22" ry="8" fill="none" stroke="#00ffff" stroke-width="1" opacity="0.3" transform="rotate(20 30 30)"/>

  <!-- Central Glow Aura -->
  <circle cx="30" cy="30" r="18" fill="url(#coreGlow)"/>

  <!-- Psi Symbol -->
  <g filter="url(#glowBlur)">
    <!-- The U shape -->
    <path d="M 16 22 Q 16 38 30 38 Q 44 38 44 22" fill="none" stroke="url(#energyGrad)" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"/>
    <!-- The Central Stem -->
    <line x1="30" y1="14" x2="30" y2="46" stroke="url(#energyGrad)" stroke-width="3.5" stroke-linecap="round"/>
    
    <!-- Highlighting for depth -->
    <path d="M 16 22 Q 16 38 30 38 Q 44 38 44 22" fill="none" stroke="#ffffff" stroke-width="1" stroke-opacity="0.5" stroke-linecap="round"/>
    <line x1="30" y1="14" x2="30" y2="46" stroke="#ffffff" stroke-width="1" stroke-opacity="0.5" stroke-linecap="round"/>
  </g>

  <!-- Energy Sparks -->
  <circle cx="30" cy="14" r="1.5" fill="#ffffff"/>
  <circle cx="16" cy="22" r="1" fill="#00ffff"/>
  <circle cx="44" cy="22" r="1" fill="#00ffff"/>

</svg>