<svg  viewBox="0 0 60 60" xmlns="http://www.w3.org/2000/svg" fill="none">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f2027" />
      <stop offset="50%" stop-color="#203a43" />
      <stop offset="100%" stop-color="#2c5364" />
    </linearGradient>
    <radialGradient id="atomGradient" cx="30%" cy="30%" r="70%">
      <stop offset="0%" stop-color="#ffffff" />
      <stop offset="40%" stop-color="#00d2ff" />
      <stop offset="100%" stop-color="#005f73" />
    </radialGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="1" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Background -->
  <rect width="60" height="60" rx="12" ry="12"  />

  <!-- Molecular Structure -->
  <g transform="translate(0, 0)">
    <!-- Bonds -->
    <path d="
      M 30 21 L 37.79 25.5 L 37.79 34.5 L 30 39 L 22.21 34.5 L 22.21 25.5 Z
      M 30 21 L 30 12
      M 37.79 25.5 L 45.58 21
      M 37.79 34.5 L 45.58 39
      M 30 39 L 30 48
      M 22.21 34.5 L 14.42 39
      M 22.21 25.5 L 14.42 21
    " stroke="#4facfe" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" fill="none" opacity="0.8" />

    <!-- Atoms (Inner Ring) -->
    <circle cx="30" cy="21" r="2.5" fill="url(#atomGradient)" />
    <circle cx="37.79" cy="25.5" r="2.5" fill="url(#atomGradient)" />
    <circle cx="37.79" cy="34.5" r="2.5" fill="url(#atomGradient)" />
    <circle cx="30" cy="39" r="2.5" fill="url(#atomGradient)" />
    <circle cx="22.21" cy="34.5" r="2.5" fill="url(#atomGradient)" />
    <circle cx="22.21" cy="25.5" r="2.5" fill="url(#atomGradient)" />

    <!-- Atoms (Outer Ring) -->
    <circle cx="30" cy="12" r="2.5" fill="url(#atomGradient)" />
    <circle cx="45.58" cy="21" r="2.5" fill="url(#atomGradient)" />
    <circle cx="45.58" cy="39" r="2.5" fill="url(#atomGradient)" />
    <circle cx="30" cy="48" r="2.5" fill="url(#atomGradient)" />
    <circle cx="14.42" cy="39" r="2.5" fill="url(#atomGradient)" />
    <circle cx="14.42" cy="21" r="2.5" fill="url(#atomGradient)" />
  </g>
</svg>